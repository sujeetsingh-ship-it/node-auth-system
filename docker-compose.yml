version: '3.8'

services:
  app:
    build: .
    container_name: auth_app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - mysql
      - mongodb        # ← MongoDB bhi add kiya
    networks:
      - auth_network

  mysql:
    image: mysql:8.0
    container_name: auth_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - auth_network

  mongodb:                                    # ← Naya service
    image: mongo:7.0
    container_name: auth_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_pass
      MONGO_INITDB_DATABASE: auth_logs        # ← logs store karenge yahan
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db                   # ← data persist karega
    networks:
      - auth_network

volumes:
  mysql_data:
  mongo_data:         # ← MongoDB ka volume bhi add kiya

networks:
  auth_network:
    driver: bridge